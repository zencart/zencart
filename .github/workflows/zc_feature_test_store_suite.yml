name: Zen Cart Store Feature Tests

on: [push, pull_request]

jobs:
  build:
    permissions:
      contents: read

    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.2', '8.3', '8.5']

    continue-on-error: ${{ matrix.php-version == '8.6' }}

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db
          MYSQL_USER: db
          MYSQL_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          ini-values: log_errors=On
          tools: composer, phpunit

      - name: Install Composer Dependencies
        run: |
          php not_for_release/testFramework/fp_diagnostic.php
          composer install --no-progress --no-interaction --no-ansi --no-scripts

      - name: Patch composer files for PHP 8.4 compatibility
        if: matrix.php-version >= '8.4'
        run: |
          composer update
          sh not_for_release/testFramework/copyVendorFiles.sh

      - name: Wait for Database to be Ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -udb -proot --silent; then
              echo "Database is ready"
              exit 0
            fi
            echo "Waiting for database... attempt $i"
            sleep 1
          done
          echo "Database failed to start"
          exit 1

      - name: Configure UTF-8 Locale
        run: |
          sudo locale-gen en_US.UTF-8
          echo "LANG=en_US.UTF-8" >> "$GITHUB_ENV"
          echo "LC_ALL=en_US.UTF-8" >> "$GITHUB_ENV"
          echo "LANGUAGE=en_US:en" >> "$GITHUB_ENV"

      - name: Start PHP Built-in Server
        env:
          HTTP_SERVER: http://localhost:8000
        run: |
          ZENCART_TESTFRAMEWORK_RUNNING=1 ZENCART_TESTFRAMEWORK_CONFIG_USER=runner php -d display_errors=1 -d display_startup_errors=1 -d auto_prepend_file="$GITHUB_WORKSPACE/not_for_release/testFramework/Support/php_server_prepend.php" -S localhost:8000 -t . > /tmp/php_server.log 2>&1 &
          sleep 2
          curl -I http://localhost:8000/ || (cat /tmp/php_server.log && exit 1)

      - name: Smoke Test Store Endpoint
        run: |
          curl -sS -D /tmp/store_smoke_headers.txt http://localhost:8000/index.php -o /tmp/store_smoke_body.html
          echo "=== store headers ==="
          cat /tmp/store_smoke_headers.txt
          echo "=== store body (first 200 lines) ==="
          sed -n '1,200p' /tmp/store_smoke_body.html
          grep -qE '^HTTP/[0-9.]+ 200' /tmp/store_smoke_headers.txt

      - name: Execute Store Feature Tests
        env:
          HTTP_SERVER: http://localhost:8000
        run: php vendor/bin/phpunit --testsuite FeatureStore

      - name: Show PHP Server Log On Failure
        if: failure()
        run: |
          echo "=== php server log ==="
          cat /tmp/php_server.log
          echo "=== store headers ==="
          cat /tmp/store_smoke_headers.txt
          echo "=== store body (first 200 lines) ==="
          sed -n '1,200p' /tmp/store_smoke_body.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: artifacts-${{ matrix.php-version }}
          path: |
            not_for_release/testFramework/logs/console
            /tmp/php_server.log
            /tmp/store_smoke_headers.txt
            /tmp/store_smoke_body.html
          if-no-files-found: warn
          retention-days: 90
