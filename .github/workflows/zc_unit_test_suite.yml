name: Zen Cart Unit Tests

on: [push, pull_request]

jobs:
  tests-unit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5', '8.6']
    continue-on-error: ${{ matrix.php-version == '8.6' }}
    name: PHP ${{ matrix.php-version }} Unit Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2.9.8, phpunit

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --ignore-platform-reqs --prefer-dist --optimize-autoloader --no-ansi --no-scripts

      - name: Patch composer files for PHP 8.4 compatibility
        run: sh not_for_release/testFramework/copyVendorFiles.sh

      - name: Prepare the application
        run: |
          touch includes/configure.php

      - name: Run Unit Test CI Workflow
        env:
          ZC_PARALLEL_PROCESSES: 4
        run: composer tests-unit

      - name: Run Plugin-Local Unit Tests
        run: |
          if composer tests-plugin -- --suite Unit --dry-run; then
            composer tests-plugin -- --suite Unit
          else
            echo "No plugin-local unit tests found."
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: artifacts-${{ matrix.php-version }}
          path: not_for_release/testFramework/logs/console
          if-no-files-found: ignore
          retention-days: 90
